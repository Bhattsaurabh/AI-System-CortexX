version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ein_user
      POSTGRES_PASSWORD: ein_password
      POSTGRES_DB: ein_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ein_user
      RABBITMQ_DEFAULT_PASS: ein_password

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
